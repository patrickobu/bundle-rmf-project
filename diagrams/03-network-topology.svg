<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Bundle network topology diagram</title>
<desc>AWS VPC layout showing public subnet with WAF and load balancer, private app subnet with EC2, private database subnet with RDS, and external connections</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Internet cloud (outside) -->
<ellipse cx="90" cy="80" rx="60" ry="30" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
<text x="90" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#444441">Internet</text>

<!-- VPC outer boundary -->
<rect x="150" y="40" width="490" height="450" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="170" y="62" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#185FA5">AWS VPC — dedicated to Bundle EHMS</text>

<!-- Public subnet -->
<rect x="168" y="72" width="452" height="100" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.8"/>
<text x="184" y="90" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0C447C">Public subnet — internet-facing only</text>

<!-- WAF -->
<rect x="200" y="100" width="130" height="52" rx="8" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="265" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E6F1FB">AWS WAF</text>
<text x="265" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#B5D4F4">Filters malicious traffic</text>

<!-- LB -->
<rect x="430" y="100" width="160" height="52" rx="8" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="510" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E6F1FB">App load balancer</text>
<text x="510" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#B5D4F4">TLS termination</text>

<!-- WAF to LB -->
<line x1="330" y1="126" x2="428" y2="126" stroke="#0C447C" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="379" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0C447C">HTTPS</text>

<!-- Private App subnet -->
<rect x="168" y="192" width="452" height="100" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="184" y="210" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#085041">Private app subnet — no public IP addresses</text>

<!-- EC2 -->
<rect x="300" y="218" width="200" height="52" rx="8" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
<text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E1F5EE">EC2 app servers (x2)</text>
<text x="400" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9FE1CB">Auto-scaling group</text>

<!-- LB to EC2 -->
<line x1="510" y1="152" x2="460" y2="216" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Private DB subnet -->
<rect x="168" y="312" width="452" height="100" rx="10" fill="#FFF8E1" stroke="#854F0B" stroke-width="0.8"/>
<text x="184" y="330" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#633806">Private database subnet — no app server access from internet</text>

<!-- RDS -->
<rect x="300" y="338" width="200" height="52" rx="8" fill="#BA7517" stroke="#854F0B" stroke-width="0.5"/>
<text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FAEEDA">RDS PostgreSQL</text>
<text x="400" y="376" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FAC775">Multi-AZ, encrypted</text>

<!-- EC2 to RDS -->
<line x1="400" y1="270" x2="400" y2="336" stroke="#854F0B" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="414" y="306" font-family="Arial, sans-serif" font-size="10" fill="#854F0B">TLS</text>

<!-- Security group labels -->
<text x="184" y="430" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#444441">Security group rules:</text>
<text x="184" y="448" font-family="Arial, sans-serif" font-size="10" fill="#555555">WAF: allows 443 inbound from internet only</text>
<text x="184" y="464" font-family="Arial, sans-serif" font-size="10" fill="#555555">EC2: allows traffic from load balancer only — no direct internet</text>
<text x="184" y="480" font-family="Arial, sans-serif" font-size="10" fill="#555555">RDS: allows port 5432 from EC2 security group only</text>

<!-- Internet to WAF arrow -->
<line x1="150" y1="80" x2="198" y2="120" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text x="155" y="108" font-family="Arial, sans-serif" font-size="10" fill="#888780">HTTPS</text>

<!-- VPN label outside -->
<rect x="30" y="240" width="110" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="85" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3C3489">Hospital VPN</text>
<text x="85" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#534AB7">Admin access only</text>
<line x1="140" y1="262" x2="166" y2="244" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
</svg>
