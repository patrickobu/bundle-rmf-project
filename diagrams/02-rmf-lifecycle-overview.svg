<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>RMF lifecycle overview diagram</title>
<desc>Seven RMF steps shown as a linear flow with a feedback loop from Monitor back to Prepare, representing the continuous cycle</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
  
<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A4B8A">NIST SP 800-37 Rev.2 — RMF lifecycle</text>
<text x="340" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555555">Bundle EHMS — 7-step security authorisation process</text>

<!-- Row 1: Steps 0-3 -->
<!-- Step 0 Prepare -->
<rect x="30" y="80" width="130" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="95" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3C3489">Step 0</text>
<text x="95" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#26215C">Prepare</text>
<text x="95" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#534AB7">Roles, risk strategy</text>

<line x1="160" y1="115" x2="188" y2="115" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 1 Categorize -->
<rect x="190" y="80" width="130" height="70" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="255" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0C447C">Step 1</text>
<text x="255" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#042C53">Categorize</text>
<text x="255" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#185FA5">FIPS 199 — HIGH</text>

<line x1="320" y1="115" x2="348" y2="115" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 2 Select -->
<rect x="350" y="80" width="130" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="415" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#085041">Step 2</text>
<text x="415" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#04342C">Select</text>
<text x="415" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0F6E56">800-53 HIGH baseline</text>

<line x1="480" y1="115" x2="508" y2="115" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 3 Implement -->
<rect x="510" y="80" width="140" height="70" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text x="580" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27500A">Step 3</text>
<text x="580" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#173404">Implement</text>
<text x="580" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3B6D11">Controls + SSP final</text>

<!-- Down arrow from step 3 -->
<line x1="580" y1="150" x2="580" y2="218" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Row 2: Steps 4-6 (right to left) -->
<!-- Step 6 Monitor -->
<rect x="30" y="220" width="130" height="70" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="95" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#444441">Step 6</text>
<text x="95" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2A">Monitor</text>
<text x="95" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5F5E5A">ConMon — ongoing</text>

<line x1="192" y1="255" x2="220" y2="255" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 5 Authorize -->
<rect x="222" y="220" width="130" height="70" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text x="287" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27500A">Step 5</text>
<text x="287" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#173404">Authorize</text>
<text x="287" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3B6D11">ATO issued</text>

<line x1="354" y1="255" x2="382" y2="255" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 4 Assess -->
<rect x="384" y="220" width="130" height="70" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="449" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#633806">Step 4</text>
<text x="449" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#412402">Assess</text>
<text x="449" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#854F0B">SAP, SAR, POA&amp;M</text>

<line x1="516" y1="255" x2="582" y2="255" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Step 3 down connector to step 4 -->
<rect x="516" y="220" width="130" height="70" rx="10" fill="none" stroke="none"/>
<line x1="580" y1="222" x2="580" y2="255" stroke="#854F0B" stroke-width="1.5"/>
<line x1="580" y1="255" x2="518" y2="255" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Feedback loop arrow from Monitor back up -->
<path d="M 30 255 L 15 255 L 15 115 L 28 115" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow)"/>

<!-- Feedback loop label -->
<text x="12" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5F5E5A" transform="rotate(-90,12,195)">Reauth / system change</text>

<!-- ATO badge -->
<rect x="200" y="330" width="280" height="60" rx="10" fill="#E8F5E9" stroke="#1A6B3C" stroke-width="1.5"/>
<text x="340" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A6B3C">ATO granted</text>
<text x="340" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1A6B3C">BUNDLE-ATO-2025-001 — valid 3 years</text>

<!-- Arrow from Authorize to ATO badge -->
<line x1="287" y1="290" x2="300" y2="328" stroke="#1A6B3C" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Key facts -->
<text x="340" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#444441" font-weight="bold">Key facts about Bundle's RMF</text>
<text x="340" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555555">Impact level: HIGH  |  Controls: NIST 800-53 Rev.5  |  Regulation: HIPAA</text>
<text x="340" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555555">Assessor: ClearPath Security LLC  |  Hosting: AWS  |  Users: 500</text>
</svg>
