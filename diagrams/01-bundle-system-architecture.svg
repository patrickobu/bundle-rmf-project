<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Bundle system architecture diagram</title>
<desc>AWS cloud infrastructure for Bundle EHMS showing users, WAF, load balancer, EC2, RDS, S3, CloudWatch, KMS, and cross-region backup</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- AWS VPC outer boundary -->
<rect x="30" y="90" width="480" height="490" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="1" stroke-dasharray="6 3"/>
<text x="50" y="114" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#185FA5">AWS VPC — Bundle EHMS (US East)</text>

<!-- Public subnet -->
<rect x="50" y="128" width="440" height="90" rx="10" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="68" y="148" font-family="Arial, sans-serif" font-size="11" fill="#0C447C" font-weight="bold">Public subnet</text>

<!-- WAF box -->
<rect x="70" y="158" width="120" height="44" rx="6" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="130" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E6F1FB">AWS WAF</text>

<!-- Load Balancer box -->
<rect x="300" y="158" width="160" height="44" rx="6" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="380" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E6F1FB">Load balancer</text>

<!-- WAF to LB arrow -->
<line x1="190" y1="180" x2="298" y2="180" stroke="#0C447C" stroke-width="1" marker-end="url(#arrow)"/>
<text x="244" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0C447C">HTTPS</text>

<!-- Private App subnet -->
<rect x="50" y="238" width="440" height="90" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="68" y="258" font-family="Arial, sans-serif" font-size="11" fill="#085041" font-weight="bold">Private app subnet</text>

<!-- EC2 box -->
<rect x="170" y="268" width="200" height="44" rx="6" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
<text x="270" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E1F5EE">EC2 app servers</text>
<text x="270" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9FE1CB">Amazon Linux 2023</text>

<!-- LB to EC2 arrow -->
<line x1="380" y1="202" x2="340" y2="266" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Private DB subnet -->
<rect x="50" y="348" width="440" height="90" rx="10" fill="#FFF8E1" stroke="#854F0B" stroke-width="0.5"/>
<text x="68" y="368" font-family="Arial, sans-serif" font-size="11" fill="#633806" font-weight="bold">Private database subnet</text>

<!-- RDS box -->
<rect x="170" y="378" width="200" height="44" rx="6" fill="#BA7517" stroke="#854F0B" stroke-width="0.5"/>
<text x="270" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FAEEDA">RDS PostgreSQL</text>
<text x="270" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FAC775">Encrypted AES-256</text>

<!-- EC2 to RDS arrow -->
<line x1="270" y1="312" x2="270" y2="376" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>
<text x="284" y="348" font-family="Arial, sans-serif" font-size="10" fill="#854F0B">TLS</text>

<!-- Support services row -->
<rect x="50" y="458" width="440" height="100" rx="10" fill="#F4F7FC" stroke="#888780" stroke-width="0.5"/>
<text x="68" y="478" font-family="Arial, sans-serif" font-size="11" fill="#444441" font-weight="bold">Supporting services</text>

<!-- S3 -->
<rect x="65" y="488" width="90" height="44" rx="6" fill="#5F5E5A" stroke="#444441" stroke-width="0.5"/>
<text x="110" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F1EFE8">S3 storage</text>
<text x="110" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D3D1C7">SSE-KMS</text>

<!-- CloudWatch -->
<rect x="175" y="488" width="110" height="44" rx="6" fill="#5F5E5A" stroke="#444441" stroke-width="0.5"/>
<text x="230" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F1EFE8">CloudWatch</text>
<text x="230" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D3D1C7">90-day logs</text>

<!-- KMS -->
<rect x="305" y="488" width="80" height="44" rx="6" fill="#5F5E5A" stroke="#444441" stroke-width="0.5"/>
<text x="345" y="514" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F1EFE8">KMS</text>

<!-- IAM -->
<rect x="405" y="488" width="70" height="44" rx="6" fill="#5F5E5A" stroke="#444441" stroke-width="0.5"/>
<text x="440" y="514" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F1EFE8">IAM</text>

<!-- EC2 to S3 -->
<line x1="200" y1="312" x2="130" y2="486" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<!-- EC2 to CloudWatch -->
<line x1="270" y1="312" x2="240" y2="486" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Users outside -->
<rect x="540" y="148" width="120" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="600" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3C3489">Hospital users</text>
<text x="600" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#534AB7">Doctors, nurses, admin</text>

<!-- Users to WAF -->
<line x1="540" y1="170" x2="192" y2="170" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
<text x="380" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#534AB7">HTTPS / TLS 1.2+</text>

<!-- Active Directory outside -->
<rect x="540" y="268" width="120" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="600" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3C3489">Active Directory</text>
<text x="600" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#534AB7">Hospital network</text>

<!-- EC2 to AD -->
<line x1="370" y1="285" x2="538" y2="285" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="460" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#534AB7">LDAPS</text>

<!-- DR Backup outside -->
<rect x="540" y="488" width="120" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="600" y="507" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#712B13">S3 backup</text>
<text x="600" y="521" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#993C1D">US West — DR</text>

<!-- S3 to DR backup -->
<line x1="512" y1="510" x2="538" y2="510" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>
<text x="525" y="504" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#993C1D">Daily</text>

<!-- Legend -->
<text x="30" y="608" font-family="Arial, sans-serif" font-size="11" fill="#444441" font-weight="bold">Legend:</text>
<rect x="90" y="596" width="14" height="14" rx="2" fill="#185FA5"/>
<text x="108" y="608" font-family="Arial, sans-serif" font-size="11" fill="#444441">AWS (Bundle managed)</text>
<rect x="270" y="596" width="14" height="14" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="288" y="608" font-family="Arial, sans-serif" font-size="11" fill="#444441">External systems</text>
<line x1="410" y1="603" x2="440" y2="603" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="445" y="608" font-family="Arial, sans-serif" font-size="11" fill="#444441">Internal flow</text>
</svg>
