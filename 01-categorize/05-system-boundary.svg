<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Bundle system boundary diagram</title>
<desc>Three zones showing what is inside Bundle authorization boundary, what is inherited from AWS, and external third-party connections</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="340" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1A4B8A">Bundle system boundary</text>
<!-- Zone 1: Inside boundary -->
<rect x="30" y="44" width="340" height="280" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
<text x="200" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#185FA5">Inside authorization boundary</text>
<text x="200" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#185FA5">(Bundle team responsible)</text>
<rect x="50" y="96" width="140" height="34" rx="6" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="120" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E6F1FB">EC2 app servers</text>
<rect x="210" y="96" width="140" height="34" rx="6" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="280" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E6F1FB">RDS database</text>
<rect x="50" y="148" width="140" height="34" rx="6" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="120" y="169" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E6F1FB">S3 storage</text>
<rect x="210" y="148" width="140" height="34" rx="6" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="280" y="169" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E6F1FB">CloudWatch logs</text>
<rect x="50" y="200" width="140" height="34" rx="6" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="120" y="221" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E6F1FB">IAM + KMS</text>
<rect x="210" y="200" width="140" height="34" rx="6" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="280" y="221" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E6F1FB">WAF + VPC</text>
<rect x="50" y="252" width="300" height="34" rx="6" fill="#185FA5" stroke="#0C447C" stroke-width="0.5"/>
<text x="200" y="273" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E6F1FB">Bundle application code + config</text>
<!-- Zone 2: Inherited from AWS -->
<rect x="30" y="340" width="340" height="110" rx="14" fill="#F1EFE8" stroke="#888780" stroke-width="1.5" stroke-dasharray="6 3"/>
<text x="200" y="362" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#5F5E5A">Inherited from AWS</text>
<text x="200" y="378" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#888780">(AWS responsible — SOC 2 + ISO 27001)</text>
<text x="60" y="398" font-family="Arial,sans-serif" font-size="11" fill="#444441">Physical data centres</text>
<text x="60" y="414" font-family="Arial,sans-serif" font-size="11" fill="#444441">Hypervisor and hardware</text>
<text x="230" y="398" font-family="Arial,sans-serif" font-size="11" fill="#444441">Physical network</text>
<text x="230" y="414" font-family="Arial,sans-serif" font-size="11" fill="#444441">Hardware disposal</text>
<!-- Zone 3: External connections -->
<rect x="394" y="44" width="260" height="280" rx="14" fill="#FFF8E1" stroke="#854F0B" stroke-width="1"/>
<text x="524" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#854F0B">External connections</text>
<text x="524" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#854F0B">(separate authorizations)</text>
<rect x="414" y="96" width="220" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="524" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#633806">Insurance billing API</text>
<rect x="414" y="148" width="220" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="524" y="169" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#633806">Laboratory info system</text>
<rect x="414" y="200" width="220" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="524" y="221" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#633806">Pharmacy system</text>
<rect x="414" y="252" width="220" height="34" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="524" y="273" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#633806">Hospital Active Directory</text>
<!-- Arrows from boundary to external -->
<line x1="370" y1="113" x2="412" y2="113" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="370" y1="165" x2="412" y2="165" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="370" y1="218" x2="412" y2="218" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="370" y1="270" x2="412" y2="270" stroke="#854F0B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<!-- Protocol labels -->
<text x="391" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#854F0B">TLS</text>
<text x="391" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#854F0B">TLS</text>
<text x="391" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#854F0B">TLS</text>
<text x="391" y="265" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#854F0B">LDAPS</text>
<!-- Legend -->
<rect x="30" y="462" width="16" height="10" rx="2" fill="#185FA5"/>
<text x="52" y="471" font-family="Arial,sans-serif" font-size="10" fill="#444441">In scope (Bundle managed)</text>
<rect x="230" y="462" width="16" height="10" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="252" y="471" font-family="Arial,sans-serif" font-size="10" fill="#444441">Inherited (AWS)</text>
<rect x="360" y="462" width="16" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="382" y="471" font-family="Arial,sans-serif" font-size="10" fill="#444441">External (separate auth)</text>
</svg>