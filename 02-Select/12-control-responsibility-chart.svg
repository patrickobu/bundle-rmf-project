<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Bundle control responsibility breakdown chart</title>
<desc>Bar chart and breakdown showing how controls are split between system-specific managed by Bundle team, hybrid shared with AWS, and fully inherited from AWS</desc>
<text x="340" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1A4B8A">Control responsibility breakdown — Bundle EHMS</text>
<text x="340" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555555">Who implements and maintains each control type</text>

<!-- Bar chart -->
<!-- System-specific bar -->
<text x="40" y="90" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#185FA5">System-specific</text>
<text x="40" y="106" font-family="Arial,sans-serif" font-size="10" fill="#555">Bundle team responsible</text>
<rect x="200" y="80" width="310" height="40" rx="6" fill="#185FA5"/>
<text x="516" y="104" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#185FA5">  ~75 controls (54%)</text>

<!-- Hybrid bar -->
<text x="40" y="162" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1D9E75">Hybrid</text>
<text x="40" y="178" font-family="Arial,sans-serif" font-size="10" fill="#555">Shared — Bundle + AWS</text>
<rect x="200" y="152" width="215" height="40" rx="6" fill="#1D9E75"/>
<text x="420" y="176" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1D9E75">  ~52 controls (37%)</text>

<!-- Inherited bar -->
<text x="40" y="234" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#888780">Inherited (AWS)</text>
<text x="40" y="250" font-family="Arial,sans-serif" font-size="10" fill="#555">AWS fully responsible</text>
<rect x="200" y="224" width="68" height="40" rx="6" fill="#888780"/>
<text x="274" y="248" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#888780">  ~13 controls (9%)</text>

<!-- Responsibility explanation -->
<rect x="30" y="290" width="296" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="178" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1A4B8A">Bundle team responsibilities</text>
<text x="44" y="330" font-family="Arial,sans-serif" font-size="10" fill="#333">Implement and maintain all system-specific controls</text>
<text x="44" y="346" font-family="Arial,sans-serif" font-size="10" fill="#333">Configure hybrid controls on AWS infrastructure</text>
<text x="44" y="362" font-family="Arial,sans-serif" font-size="10" fill="#333">Verify inherited controls via AWS SOC 2 reports</text>
<text x="44" y="378" font-family="Arial,sans-serif" font-size="10" fill="#333">Own and maintain the System Security Plan (SSP)</text>

<rect x="354" y="290" width="296" height="90" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="502" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#085041">AWS responsibilities</text>
<text x="368" y="330" font-family="Arial,sans-serif" font-size="10" fill="#333">Physical data centre security (PE family)</text>
<text x="368" y="346" font-family="Arial,sans-serif" font-size="10" fill="#333">Hypervisor and hardware isolation (SC-39)</text>
<text x="368" y="362" font-family="Arial,sans-serif" font-size="10" fill="#333">Hardware maintenance and disposal</text>
<text x="368" y="378" font-family="Arial,sans-serif" font-size="10" fill="#333">Evidence: SOC 2 Type II + ISO 27001 + HIPAA BAA</text>
</svg>